<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DATA: CONTENT_MEMORY_SPACE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #info {
            position: absolute; top: 30px; left: 40px; color: #bcff00;
            text-transform: uppercase; letter-spacing: 5px; font-size: 0.7rem; font-weight: 800;
            opacity: 0.8; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="info">MEMORY: REAL_DATA_EMBEDDING_CLUSTERS</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 100;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Content Clusters ---
        const clusterCount = 8;
        const group = new THREE.Group();
        scene.add(group);

        for (let c = 0; clusterCount > c; c++) {
            const clusterGroup = new THREE.Group();
            const particleCount = 200 + Math.random() * 500;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(particleCount * 3);
            const col = new Float32Array(particleCount * 3);
            const center = new THREE.Vector3((Math.random()-0.5)*150, (Math.random()-0.5)*150, (Math.random()-0.5)*150);
            
            const color = new THREE.Color().setHSL(Math.random(), 0.8, 0.5);

            for (let i = 0; i < particleCount; i++) {
                pos[i*3] = center.x + (Math.random()-0.5)*20;
                pos[i*3+1] = center.y + (Math.random()-0.5)*20;
                pos[i*3+2] = center.z + (Math.random()-0.5)*20;
                col[i*3] = color.r; col[i*3+1] = color.g; col[i*3+2] = color.b;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
            const mat = new THREE.PointsMaterial({ size: 1, vertexColors: true, transparent: true, opacity: 0.6 });
            const points = new THREE.Points(geo, mat);
            group.add(points);
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
