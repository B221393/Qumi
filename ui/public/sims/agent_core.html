<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Autonomous Agent Core</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Consolas', monospace; color: #00f2ff; }
        #agent-ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 400px;
            height: 200px;
            background: rgba(0, 10, 20, 0.8);
            border: 1px solid #00f2ff;
            padding: 15px;
            font-size: 0.8rem;
            overflow-y: hidden;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
        .log-entry { margin-bottom: 5px; opacity: 0; animation: fadeIn 0.3s forwards; }
        .log-entry.task { color: #bcff00; font-weight: bold; }
        .log-entry.info { color: #88c0d0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #status-header { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(0, 242, 255, 0.3); padding-bottom: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="agent-ui">
        <div id="status-header">
            <span>AGENT_ID: GEN-1.5-PRO</span>
            <span id="task-count">TASKS: 0</span>
        </div>
        <div id="log-container"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // エージェントの「核（コア）」
        const coreGeo = new THREE.IcosahedronGeometry(10, 2);
        const coreMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.5 });
        const core = new THREE.Mesh(coreGeo, coreMat);
        scene.add(core);

        // 周囲を回る「思考ノード」
        const nodes = new THREE.Group();
        scene.add(nodes);
        const nodeGeo = new THREE.BoxGeometry(1, 1, 1);
        const nodeMat = new THREE.MeshBasicMaterial({ color: 0xbcff00 });
        
        for(let i=0; i<12; i++) {
            const node = new THREE.Mesh(nodeGeo, nodeMat);
            const angle = (i / 12) * Math.PI * 2;
            node.position.set(Math.cos(angle) * 25, Math.sin(angle) * 25, 0);
            nodes.add(node);
        }

        camera.position.z = 60;

        // ログ生成システム
        const logContainer = document.getElementById('log-container');
        const tasks = [
            "Scanning project structure...",
            "Analyzing file: index.html",
            "Establishing neural link to GitHub CLI...",
            "Parallel sub-agent fleet deployed.",
            "Analyzing token efficiency for Japanese prompts...",
            "Optimization complete. Performance +12%.",
            "Monitoring codebase for real-time changes...",
            "Agent GEN-1.5-PRO: Awaiting instructions."
        ];

        function addLog(text, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = `> ${text}`;
            logContainer.prepend(entry);
            if (logContainer.children.length > 8) logContainer.removeChild(logContainer.lastChild);
        }

        let taskIndex = 0;
        function processNextTask() {
            addLog(tasks[taskIndex % tasks.length], Math.random() > 0.7 ? 'task' : 'info');
            taskIndex++;
            document.getElementById('task-count').innerText = `TASKS: ${taskIndex}`;
            
            // ログに合わせてコアを脈動させる
            core.scale.set(1.2, 1.2, 1.2);
            setTimeout(() => core.scale.set(1, 1, 1), 200);

            setTimeout(processNextTask, 2000 + Math.random() * 3000);
        }
        processNextTask();

        function animate(t) {
            requestAnimationFrame(animate);
            core.rotation.y += 0.01;
            core.rotation.z += 0.005;
            nodes.rotation.z -= 0.01;
            nodes.children.forEach((node, i) => {
                node.rotation.x += 0.05;
                node.scale.setScalar(1 + Math.sin(t * 0.005 + i) * 0.2);
            });
            renderer.render(scene, camera);
        }
        animate(0);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
