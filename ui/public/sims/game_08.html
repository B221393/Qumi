<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Voice Sense Core | App #08</title>
<style>
  body, html { margin: 0; padding: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #ui { 
    position: absolute; top: 20px; left: 20px; color: #00d4ff; z-index: 10; pointer-events: none;
    text-shadow: 0 0 10px #00d4ff;
  }
  h1 { margin: 0; font-size: 1rem; letter-spacing: 3px; }
  #status { font-size: 0.7rem; color: #fff; opacity: 0.6; margin-top: 5px; }
  .mic-button {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    background: rgba(0, 212, 255, 0.2); border: 1px solid #00d4ff; color: #00d4ff;
    padding: 15px 30px; borderRadius: 30px; font-size: 0.8rem; letter-spacing: 2px;
    cursor: pointer; pointer-events: auto; backdrop-filter: blur(10px);
  }
</style>
</head>
<body>
<div id="ui">
  <h1>VOICE SENSE CORE</h1>
  <div id="status">WAITING FOR INPUT...</div>
</div>
<button class="mic-button" id="micBtn">START LISTENING</button>
<canvas id="canvas"></canvas>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const micBtn = document.getElementById('micBtn');
  const statusText = document.getElementById('status');
  
  let width, height;
  let audioContext, analyser, dataArray;
  let isListening = false;

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  micBtn.onclick = async () => {
    if (isListening) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioContext.createMediaStreamSource(stream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      
      isListening = true;
      micBtn.style.display = 'none';
      statusText.innerText = 'CORE ACTIVE: LISTENING TO YOUR SOUL...';
      animate();
    } catch (err) {
      alert('Microphone access denied. Visuals will be in idle mode.');
      isListening = true;
      micBtn.style.display = 'none';
      animate();
    }
  };

  let angle = 0;
  function animate() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
    ctx.fillRect(0, 0, width, height);

    let volume = 0;
    if (analyser) {
      analyser.getByteFrequencyData(dataArray);
      volume = dataArray.reduce((a, b) => a + b) / dataArray.length;
    } else {
      // Idle pulse if no mic
      volume = 20 + Math.sin(Date.now() * 0.002) * 10;
    }

    const centerX = width / 2;
    const centerY = height / 2;
    const baseRadius = Math.min(width, height) * 0.2;
    const dynamicRadius = baseRadius + (volume * 1.5);

    // Draw Glow
    const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, dynamicRadius * 1.5);
    gradient.addColorStop(0, `rgba(0, 212, 255, ${volume / 255})`);
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, height);

    // Draw Core Ring
    ctx.strokeStyle = '#00d4ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < 360; i += 2) {
      const rad = (i + angle) * Math.PI / 180;
      const offset = (volume > 0) ? (Math.sin(i * 0.1 + angle * 0.1) * (volume * 0.5)) : 0;
      const r = dynamicRadius + offset;
      const x = centerX + Math.cos(rad) * r;
      const y = centerY + Math.sin(rad) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();

    // Particle pulse
    if (volume > 50) {
      for (let i = 0; i < 5; i++) {
        const r = dynamicRadius;
        const a = Math.random() * Math.PI * 2;
        ctx.fillStyle = '#00d4ff';
        ctx.beginPath();
        ctx.arc(centerX + Math.cos(a) * r, centerY + Math.sin(a) * r, Math.random() * 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    angle += 1 + (volume * 0.1);
    requestAnimationFrame(animate);
  }

  // Initial Draw (Idle)
  if (!isListening) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, width, height);
    ctx.font = '12px monospace';
    ctx.fillStyle = '#00d4ff';
    ctx.textAlign = 'center';
    ctx.fillText('SYSTEM READY: STANDBY', width/2, height/2 - 50);
  }
</script>
</body>
</html>
