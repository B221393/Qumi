<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXEL EXPANSION | App #8</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Outfit', sans-serif; }
        #ui { position: absolute; bottom: 40px; right: 40px; color: #fff; text-align: right; }
        .label { font-size: 0.6rem; letter-spacing: 3px; opacity: 0.5; }
        .version { font-size: 1.2rem; font-weight: 300; color: #f43f5e; }
        #header { position: absolute; top: 40px; left: 40px; color: #fff; }
        h1 { margin: 0; font-weight: 200; letter-spacing: 8px; font-size: 1.5rem; color: #f43f5e; }
        .desc { font-size: 0.7rem; opacity: 0.6; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="header">
        <h1>VOXEL EXPANSION</h1>
        <div class="desc">AUTONOMOUS GROWTH SIMULATION / CORE_EXPAND_01</div>
    </div>
    <div id="ui">
        <div class="label">SYSTEM_STATUS</div>
        <div class="version">EXPANDING...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, voxels = [];
        const maxVoxels = 200;
        const cubeSize = 5;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(100, 100, 100);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);

            // Initial Voxel
            addVoxel(0, 0, 0);

            animate();
        }

        function addVoxel(x, y, z) {
            if (voxels.length >= maxVoxels) {
                const oldest = voxels.shift();
                scene.remove(oldest);
            }

            const geometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
            const material = new THREE.MeshPhongMaterial({
                color: new THREE.Color().setHSL(Math.random(), 0.7, 0.5),
                transparent: true,
                opacity: 0.8
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(x, y, z);
            
            // Wireframe edge
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.3, transparent: true }));
            cube.add(line);

            scene.add(cube);
            voxels.push(cube);

            return cube;
        }

        function animate() {
            requestAnimationFrame(animate);

            if (Math.random() > 0.95 && voxels.length < maxVoxels) {
                const ref = voxels[Math.floor(Math.random() * voxels.length)];
                const dir = Math.floor(Math.random() * 6);
                let newPos = ref.position.clone();

                switch(dir) {
                    case 0: newPos.x += cubeSize; break;
                    case 1: newPos.x -= cubeSize; break;
                    case 2: newPos.y += cubeSize; break;
                    case 3: newPos.y -= cubeSize; break;
                    case 4: newPos.z += cubeSize; break;
                    case 5: newPos.z -= cubeSize; break;
                }
                addVoxel(newPos.x, newPos.y, newPos.z);
            }

            scene.rotation.y += 0.005;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
