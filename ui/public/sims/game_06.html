<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUID VORTEX | App #6</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Outfit', sans-serif; }
        #ui { position: absolute; top: 30px; left: 30px; z-index: 100; pointer-events: none; border-left: 2px solid #6366f1; padding-left: 15px; }
        h1 { font-size: 1.2rem; letter-spacing: 5px; color: #818cf8; margin: 0; }
        p { font-size: 0.7rem; color: #fff; opacity: 0.5; margin: 5px 0; }
        .data { font-family: monospace; font-size: 0.8rem; color: #6366f1; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>FLUID VORTEX</h1>
        <p>SIMULATION ENGINE | VORTEX_DYNAMICS_01</p>
        <div class="data" id="stats">PARTICLES: 5000 / FLOW: ACTIVE</div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, particles;
        const particleCount = 5000;
        let mouseX = 0, mouseY = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 150;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);

            for (let i = 0; i < particleCount; i++) {
                // Initialize in a sphere
                const radius = Math.random() * 50;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;

                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = radius * Math.cos(phi);

                colors[i * 3] = 0.4 + Math.random() * 0.2; // R
                colors[i * 3 + 1] = 0.5 + Math.random() * 0.3; // G
                colors[i * 3 + 2] = 0.9 + Math.random() * 0.1; // B
                
                sizes[i] = Math.random() * 2;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const material = new THREE.PointsMaterial({
                size: 1.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            window.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX - window.innerWidth / 2) * 0.1;
                mouseY = (e.clientY - window.innerHeight / 2) * 0.1;
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            const positions = particles.geometry.attributes.position.array;
            const time = Date.now() * 0.0005;

            for (let i = 0; i < particleCount; i++) {
                const x = positions[i * 3];
                const y = positions[i * 3 + 1];
                const z = positions[i * 3 + 2];

                // Vortex physics
                const dist = Math.sqrt(x * x + y * y);
                const angle = Math.atan2(y, x) + 0.1 / (dist * 0.02 + 1);
                const speed = 0.5 + Math.sin(time + dist * 0.1) * 0.2;

                positions[i * 3] = Math.cos(angle) * dist + (Math.sin(z * 0.05 + time) * 0.5);
                positions[i * 3 + 1] = Math.sin(angle) * dist + (Math.cos(z * 0.05 + time) * 0.5);
                positions[i * 3 + 2] += Math.sin(time + x * 0.01) * 0.2 + (mouseY * 0.01);

                // Re-spawn if too far
                if (Math.abs(z) > 100) positions[i * 3 + 2] = (Math.random() - 0.5) * 50;
            }

            particles.geometry.attributes.position.needsUpdate = true;
            particles.rotation.y += 0.002 + (mouseX * 0.0001);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
