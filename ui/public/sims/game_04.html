<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL VISUALIZER | App #4</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #ui { position: absolute; bottom: 30px; left: 30px; z-index: 100; pointer-events: none; border-left: 2px solid #38bdf8; padding-left: 15px; }
        h1 { font-size: 1.2rem; letter-spacing: 6px; color: #38bdf8; margin: 0; text-transform: uppercase; }
        p { font-size: 0.7rem; color: #fff; opacity: 0.4; margin: 5px 0; }
        .status { font-size: 0.8rem; color: #10b981; font-weight: bold; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Neural Connection</h1>
        <p>AUTONOMOUS GEN: APP #4 / BRAIN_SYNC_01</p>
        <div class="status">● SYSTEM AWAKE / ACTIVE LOOP</div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        let scene, camera, renderer, controls, points, lineMesh;
        const particleCount = 100;
        const maxDistance = 150;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 300;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.autoRotate = true;
            controls.autoRotateSpeed = 2.0;

            // Particles (Nodes)
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = [];

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 400;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 400;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 400;
                velocities.push(new THREE.Vector3((Math.random() - 0.5) * 0.5, (Math.random() - 0.5) * 0.5, (Math.random() - 0.5) * 0.5));
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ color: 0x38bdf8, size: 3, transparent: true, blending: THREE.AdditiveBlending });
            points = new THREE.Points(geometry, material);
            scene.add(points);
            points.userData.velocities = velocities;

            // Lines (Connections)
            const lineGeometry = new THREE.BufferGeometry();
            const linePositions = new Float32Array(particleCount * particleCount * 6);
            lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
            const lineMaterial = new THREE.LineBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending });
            lineMesh = new THREE.LineSegments(lineGeometry, lineMaterial);
            scene.add(lineMesh);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const positions = points.geometry.attributes.position.array;
            const velocityArray = points.userData.velocities;

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] += velocityArray[i].x;
                positions[i * 3 + 1] += velocityArray[i].y;
                positions[i * 3 + 2] += velocityArray[i].z;

                // Bounce
                if (Math.abs(positions[i * 3]) > 200) velocityArray[i].x *= -1;
                if (Math.abs(positions[i * 3 + 1]) > 200) velocityArray[i].y *= -1;
                if (Math.abs(positions[i * 3 + 2]) > 200) velocityArray[i].z *= -1;
            }
            points.geometry.attributes.position.needsUpdate = true;

            // Update Lines
            const linePos = lineMesh.geometry.attributes.position.array;
            let lineIdx = 0;
            let connections = 0;

            for (let i = 0; i < particleCount; i++) {
                for (let j = i + 1; j < particleCount; j++) {
                    const dx = positions[i * 3] - positions[j * 3];
                    const dy = positions[i * 3 + 1] - positions[j * 3 + 1];
                    const dz = positions[i * 3 + 2] - positions[j * 3 + 2];
                    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

                    if (dist < maxDistance) {
                        linePos[lineIdx++] = positions[i * 3];
                        linePos[lineIdx++] = positions[i * 3 + 1];
                        linePos[lineIdx++] = positions[i * 3 + 2];
                        linePos[lineIdx++] = positions[j * 3];
                        linePos[lineIdx++] = positions[j * 3 + 1];
                        linePos[lineIdx++] = positions[j * 3 + 2];
                        connections++;
                    }
                }
            }
            lineMesh.geometry.setDrawRange(0, lineIdx / 3);
            lineMesh.geometry.attributes.position.needsUpdate = true;
            lineMesh.material.opacity = Math.sin(Date.now() * 0.001) * 0.1 + 0.15;

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
