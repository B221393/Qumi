<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANDWIDTH TUNER | App #11</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Outfit', sans-serif; }
        #ui { position: absolute; top: 30px; left: 30px; color: #60a5fa; pointer-events: none; }
        h1 { font-weight: 300; letter-spacing: 10px; font-size: 1.4rem; margin: 0; }
        .meta { font-size: 0.6rem; opacity: 0.5; margin-top: 5px; letter-spacing: 2px; }
        #data-view { position: absolute; bottom: 30px; right: 30px; text-align: right; color: #fff; font-family: monospace; font-size: 0.7rem; opacity: 0.4; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>BANDWIDTH TUNER</h1>
        <div class="meta">FILTERING_LOOSY_PROTOCOL / DIFFRACTION_MODE</div>
    </div>
    <div id="data-view" id="stats">
        SIGNAL: COMPLEX_WAVE<br>
        PASS_THROUGH: SLIT_01<br>
        RESULT: RE-EXPANSION
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, particles, slit;
        const particleCount = 2000;
        const speed = 1.5;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 40, 160);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Filter (Slit)
            const slitGeo = new THREE.BoxGeometry(200, 100, 2);
            const slitMat = new THREE.MeshBasicMaterial({ color: 0x1e293b, transparent: true, opacity: 0.5, wireframe: true });
            slit = new THREE.Mesh(slitGeo, slitMat);
            slit.position.z = 0;
            scene.add(slit);

            // Aperture (The narrow hole)
            const holeGeo = new THREE.BoxGeometry(20, 40, 5);
            const holeMat = new THREE.MeshBasicMaterial({ color: 0x60a5fa, wireframe: true });
            const hole = new THREE.Mesh(holeGeo, holeMat);
            hole.position.z = 0;
            scene.add(hole);

            // Particles
            const pointsGeo = new THREE.BufferGeometry();
            const pos = new Float32Array(particleCount * 3);
            const vel = [];

            for (let i = 0; i < particleCount; i++) {
                // Initialize far back
                pos[i * 3] = (Math.random() - 0.5) * 150;
                pos[i * 3 + 1] = (Math.random() - 0.5) * 80;
                pos[i * 3 + 2] = -200 - Math.random() * 200;
                
                vel.push({
                    x: (Math.random() - 0.5) * 0.1,
                    y: (Math.random() - 0.5) * 0.1,
                    z: speed
                });
            }

            pointsGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const pointsMat = new THREE.PointsMaterial({ 
                color: 0x60a5fa, 
                size: 0.8, 
                transparent: true, 
                blending: THREE.AdditiveBlending 
            });
            particles = new THREE.Points(pointsGeo, pointsMat);
            scene.add(particles);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            const positions = particles.geometry.attributes.position.array;
            
            for (let i = 0; i < particleCount; i++) {
                // Move forward (toward positive Z)
                positions[i * 3 + 2] += speed;

                // Slit check
                if (Math.abs(positions[i * 3 + 2]) < 2) {
                    // Squeeze particles within the "hole" x:[-10, 10], y:[-20, 20]
                    if (Math.abs(positions[i * 3]) > 10 || Math.abs(positions[i * 3 + 1]) > 20) {
                        // Not passed: fade or reset
                        positions[i * 3 + 2] = -400;
                    }
                }

                // Diffraction expansion after passing Z=0
                if (positions[i * 3 + 2] > 0) {
                    const expansionFactor = positions[i * 3 + 2] * 0.2;
                    positions[i * 3] += (positions[i * 3] / 10) * 0.5; // Expanding outward
                    positions[i * 3 + 1] += (positions[i * 3 + 1] / 20) * 0.5;
                }

                // Loop
                if (positions[i * 3 + 2] > 300) {
                    positions[i * 3] = (Math.random() - 0.5) * 150;
                    positions[i * 3 + 1] = (Math.random() - 0.5) * 80;
                    positions[i * 3 + 2] = -400;
                }
            }

            particles.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
