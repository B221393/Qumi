<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>TIME: HOLOGRAPHIC_CALENDAR</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #info {
            position: absolute; top: 30px; left: 40px; color: #ff0055;
            text-transform: uppercase; letter-spacing: 5px; font-size: 0.7rem; font-weight: 800;
            opacity: 0.8;
        }
        #clock-digital {
            position: absolute; font-size: 4rem; font-weight: 100; color: #fff;
            text-shadow: 0 0 20px #ff0055; letter-spacing: -2px;
        }
    </style>
</head>
<body>
    <div id="info">CHRONOS: HOLOGRAPHIC_TIME_MATRIX</div>
    <div id="clock-digital">00:00:00</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 20;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Holographic Rings ---
        const group = new THREE.Group();
        scene.add(group);

        const createRing = (radius, color, speed) => {
            const geo = new THREE.TorusGeometry(radius, 0.05, 16, 100);
            const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.4 });
            const ring = new THREE.Mesh(geo, mat);
            ring.userData = { speed };
            group.add(ring);
            return ring;
        };

        const rings = [
            createRing(8, 0xff0055, 0.01),
            createRing(9, 0x00f2ff, -0.015),
            createRing(10, 0xbcff00, 0.005)
        ];

        // Add some ticks
        for (let i = 0; i < 12; i++) {
            const geo = new THREE.BoxGeometry(0.1, 1, 0.1);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const tick = new THREE.Mesh(geo, mat);
            const angle = (i / 12) * Math.PI * 2;
            tick.position.set(Math.cos(angle) * 7.5, Math.sin(angle) * 7.5, 0);
            tick.rotation.z = angle;
            group.add(tick);
        }

        const clock = new THREE.Clock();
        const clockEl = document.getElementById('clock-digital');

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            rings.forEach(r => {
                r.rotation.z += r.userData.speed;
                r.rotation.x = Math.sin(time * 0.5) * 0.2;
            });

            group.rotation.y = Math.sin(time * 0.2) * 0.3;

            const now = new Date();
            clockEl.innerText = now.toTimeString().split(' ')[0];

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
