<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON CITY | App #2</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Outfit', sans-serif; color: #fff; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        h1 { font-size: 1.5rem; letter-spacing: 2px; color: #ff00ff; margin: 0; text-shadow: 0 0 10px #ff00ff; }
        p { font-size: 0.9rem; opacity: 0.8; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; z-index: 1000; transition: 0.5s; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>NEON CITY GENERATOR</h1>
        <p>AUTONOMOUS GEN: APP #2</p>
        <p>視点移動: マウスドラッグ</p>
    </div>
    <div class="loading" id="loader">BUILDING METROPOLIS...</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        let scene, camera, renderer, controls;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050505, 0.002);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(200, 150, 400);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            // Lights
            const ambient = new THREE.AmbientLight(0x202020);
            scene.add(ambient);

            const hemi = new THREE.HemisphereLight(0x00ffff, 0xff00ff, 0.6);
            scene.add(hemi);

            // Ground
            const grid = new THREE.GridHelper(2000, 50, 0xff00ff, 0x222222);
            scene.add(grid);

            // Building Generation
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const buildingCount = 400;

            for(let i=0; i<buildingCount; i++) {
                const h = 20 + Math.random() * 150;
                const w = 15 + Math.random() * 25;
                const d = 15 + Math.random() * 25;

                const colorBase = Math.random() > 0.5 ? 0x00ffff : 0xff00ff;
                const mat = new THREE.MeshStandardMaterial({ 
                    color: 0x111111,
                    emissive: colorBase,
                    emissiveIntensity: Math.random() * 0.5,
                    roughness: 0.2
                });

                const mesh = new THREE.Mesh(geo, mat);
                mesh.scale.set(w, h, d);
                mesh.position.x = (Math.random() - 0.5) * 1000;
                mesh.position.z = (Math.random() - 0.5) * 1000;
                mesh.position.y = h / 2;
                scene.add(mesh);

                // Top neon light
                const topGeo = new THREE.PlaneGeometry(w, d);
                const topMat = new THREE.MeshBasicMaterial({ color: colorBase });
                const top = new THREE.Mesh(topGeo, topMat);
                top.position.set(mesh.position.x, h + 0.1, mesh.position.z);
                top.rotation.x = -Math.PI / 2;
                scene.add(top);
            }

            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 500);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
