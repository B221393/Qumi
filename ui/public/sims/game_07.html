<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSOR HUB | App #7</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Outfit', sans-serif; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; border: 1px solid rgba(0, 255, 255, 0.1); box-sizing: border-box; }
        #ui { position: absolute; top: 40px; right: 40px; text-align: right; color: #00ffff; }
        .stat-group { margin-bottom: 20px; }
        .label { font-size: 0.7rem; opacity: 0.6; letter-spacing: 2px; }
        .value { font-size: 1.5rem; font-family: monospace; font-weight: 300; }
        #title-card { position: absolute; top: 40px; left: 40px; color: #fff; }
        h1 { margin: 0; font-weight: 300; letter-spacing: 10px; font-size: 1.5rem; }
        .breadcrumb { font-size: 0.6rem; color: #00ffff; margin-top: 5px; opacity: 0.8; }
        #legend { position: absolute; bottom: 40px; left: 40px; color: #fff; font-size: 0.6rem; opacity: 0.4; }
    </style>
</head>
<body>
    <div id="overlay"></div>
    <div id="title-card">
        <h1>SENSOR HUB</h1>
        <div class="breadcrumb">SYSTEM_CORE / BIOMETRIC_MONITOR / ACTIVE</div>
    </div>
    <div id="ui">
        <div class="stat-group">
            <div class="label">HOUSE_TEMP</div>
            <div class="value" id="temp">24.5°C</div>
        </div>
        <div class="stat-group">
            <div class="label">HUMIDITY</div>
            <div class="value" id="humi">48%</div>
        </div>
        <div class="stat-group">
            <div class="label">OCCUPANCY</div>
            <div class="value" id="occ">DETECTED</div>
        </div>
    </div>
    <div id="legend">ANTIGRAVITY AUTONOMOUS ENGINE | LOOP #07</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, grid, points = [];
        const sensorCount = 12;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(50, 50, 100);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Floor Grid
            const size = 200;
            const divisions = 20;
            grid = new THREE.GridHelper(size, divisions, 0x00ffff, 0x222222);
            grid.position.y = -20;
            scene.add(grid);

            // Sensor Nodes
            const geometry = new THREE.SphereGeometry(1, 16, 16);
            for (let i = 0; i < sensorCount; i++) {
                const material = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });
                const sphere = new THREE.Mesh(geometry, material);
                
                sphere.position.x = (Math.random() - 0.5) * 100;
                sphere.position.y = Math.random() * 40 - 10;
                sphere.position.z = (Math.random() - 0.5) * 100;
                
                // Connection lines
                const lineMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.1 });
                const lineGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(sphere.position.x, -20, sphere.position.z),
                    sphere.position
                ]);
                const line = new THREE.Line(lineGeo, lineMat);
                
                scene.add(sphere);
                scene.add(line);
                points.push({ mesh: sphere, originalY: sphere.position.y, offset: Math.random() * Math.PI * 2 });
            }

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            points.forEach((p, i) => {
                p.mesh.position.y = p.originalY + Math.sin(time + p.offset) * 5;
                p.mesh.material.opacity = 0.5 + Math.sin(time * 2 + p.offset) * 0.5;
            });

            scene.rotation.y += 0.001;

            // Update UI values
            if (Math.random() > 0.95) {
                document.getElementById('temp').innerText = (24 + Math.sin(time) * 0.5).toFixed(1) + "°C";
                document.getElementById('humi').innerText = (45 + Math.cos(time) * 3).toFixed(0) + "%";
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
