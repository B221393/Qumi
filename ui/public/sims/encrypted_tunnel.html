<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SEC: ENCRYPTED_TUNNEL</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #info {
            position: absolute; top: 30px; left: 40px; color: #ff0055;
            text-transform: uppercase; letter-spacing: 5px; font-size: 0.7rem; font-weight: 800;
            opacity: 0.8; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="info">SECURITY: HIGH_SPEED_ENCRYPTED_VPN_TUNNEL</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Shader Tunnel ---
        const geometry = new THREE.CylinderGeometry(1, 1, 30, 32, 1, true);
        const material = new THREE.ShaderMaterial({
            side: THREE.BackSide,
            uniforms: {
                uTime: { value: 0 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float uTime;
                varying vec2 vUv;
                void main() {
                    float pulse = sin(vUv.y * 20.0 + uTime * 10.0);
                    vec3 color = mix(vec3(0.1, 0.0, 0.05), vec3(1.0, 0.0, 0.3), step(0.8, pulse));
                    gl_FragColor = vec4(color, 1.0);
                }
            `
        });

        const tunnel = new THREE.Mesh(geometry, material);
        tunnel.rotation.x = Math.PI / 2;
        scene.add(tunnel);

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.uTime.value = clock.getElapsedTime();
            tunnel.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
