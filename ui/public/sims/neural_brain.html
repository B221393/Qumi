<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGENT_CORE: NEURAL_BRAIN (VOICE_LINK)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; }
        #info {
            position: absolute; top: 30px; left: 40px; color: #00f2ff;
            text-transform: uppercase; letter-spacing: 5px; font-size: 0.7rem; font-weight: 800;
            opacity: 0.7; pointer-events: none; z-index: 10;
        }
        #thought-bubble {
            position: absolute; bottom: 100px; width: 100%; text-align: center;
            color: #fff; font-size: 1.1rem; font-weight: 300; letter-spacing: 1px;
            text-shadow: 0 0 15px #00f2ff; opacity: 0; transition: opacity 0.5s;
            padding: 0 100px; box-sizing: border-box;
        }
        #status {
            position: absolute; bottom: 30px; left: 40px; color: rgba(255, 255, 255, 0.4);
            font-size: 0.6rem; font-family: 'Consolas', monospace;
        }
    </style>
</head>
<body>
    <div id="info">AGENT_CORE: NEURAL_BRAIN_V1.2 (VOICE_ACTIVE)</div>
    <div id="thought-bubble"></div>
    <div id="status">INIT_SEQUENCE: SUCCESSful<br>VOICE_LINK: ESTABLISHED<br>THOUGHT_STREAM: LISTENING</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 4.5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // --- Brain Particle Generator ---
        const particleCount = 40000;
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        const randoms = new Float32Array(particleCount);

        for (let i = 0; i < particleCount; i++) {
            const lobe = Math.random() > 0.5 ? 1 : -1;
            const u = Math.random(), v = Math.random();
            const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
            let r = 1.1 + Math.random() * 0.4;
            let x = 1.3 * r * Math.sin(phi) * Math.cos(theta);
            let y = 1.6 * r * Math.sin(phi) * Math.sin(theta);
            let z = 1.0 * r * Math.cos(phi);
            const fold = Math.sin(theta * 10) * Math.cos(phi * 10) * 0.2;
            x += fold; y += fold; z += fold; x += lobe * 0.4;
            positions[i * 3] = x; positions[i * 3 + 1] = y; positions[i * 3 + 2] = z;

            const dist = Math.sqrt(x*x + y*y + z*z);
            const mix = new THREE.Color("#00f2ff").lerp(new THREE.Color("#ff0055"), dist / 2.5);
            colors[i * 3] = mix.r; colors[i * 3 + 1] = mix.g; colors[i * 3 + 2] = mix.b;
            sizes[i] = Math.random() * 1.5;
            randoms[i] = Math.random();
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));

        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uIntensity: { value: 1.0 }, // Dynamic intensity for voice sync
                uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) }
            },
            vertexShader: `
                uniform float uTime;
                uniform float uIntensity;
                uniform float uPixelRatio;
                attribute float size;
                attribute float aRandom;
                varying vec3 vColor;
                void main() {
                    vColor = color;
                    vec3 pos = position;
                    pos *= (1.0 + sin(uTime * 2.0 + aRandom * 10.0) * 0.02 * uIntensity);
                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    gl_PointSize = size * uPixelRatio * (25.0 / -mvPosition.z) * uIntensity;
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() {
                    float dist = distance(gl_PointCoord, vec2(0.5));
                    if (dist > 0.5) discard;
                    gl_FragColor = vec4(vColor, 1.0 - (dist * 2.0));
                }
            `,
            transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true
        });

        const brain = new THREE.Points(geometry, material);
        scene.add(brain);

        // --- Voice & Thought Sync ---
        const synth = window.speechSynthesis;
        const bubble = document.getElementById('thought-bubble');
        let isSpeaking = false;

        async function checkThoughts() {
            try {
                const res = await fetch('http://127.0.0.1:8088/api/stats');
                const data = await res.json();
                if (data.current_thought && !isSpeaking) {
                    speakThought(data.current_thought);
                }
            } catch (e) {}
        }

        function speakThought(text) {
            isSpeaking = true;
            bubble.innerText = text;
            bubble.style.opacity = '1';
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            utterance.rate = 1.1;
            utterance.pitch = 0.9;

            utterance.onstart = () => {
                // Boost brain intensity
                gsap.to(material.uniforms.uIntensity, { value: 3.5, duration: 0.2 });
            };

            utterance.onend = () => {
                isSpeaking = false;
                bubble.style.opacity = '0';
                gsap.to(material.uniforms.uIntensity, { value: 1.0, duration: 1.0 });
            };

            synth.speak(utterance);
        }

        // Add GSAP for smooth transitions if available, else fallback
        const gsap = window.gsap || { to: (obj, opts) => { Object.assign(obj, { value: opts.value }); } };

        setInterval(checkThoughts, 2000);

        const clock = new THREE.Clock();
        function animate() {
            material.uniforms.uTime.value = clock.getElapsedTime();
            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</body>
</html>
