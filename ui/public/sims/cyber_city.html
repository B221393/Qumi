<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ASSIMILATED: CYBER_CITY</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; }
        #info {
            position: absolute; top: 30px; left: 40px; color: #ff0055;
            text-transform: uppercase; letter-spacing: 5px; font-size: 0.7rem; font-weight: 800;
            opacity: 0.8; pointer-events: none; z-index: 10;
            text-shadow: 0 0 10px #ff0055;
        }
        #stats {
            position: absolute; bottom: 30px; left: 40px; color: rgba(255, 255, 255, 0.5);
            font-size: 0.65rem; font-family: 'Consolas', monospace; z-index: 10;
        }
        .highlight { color: #00f2ff; }
        .scanline {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px; pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>
    <div id="info">ENVIRONMENT: SYNTHETIC_MEGACITY</div>
    <div id="stats">
        SECTOR: <span class="highlight">A-99</span><br>
        PROCEDURAL_GENERATION: <span class="highlight">ACTIVE</span><br>
        SOURCE: GitHub / Retro-Wave Shaders
    </div>
    <div class="scanline"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Grid floor
        const gridHelper = new THREE.GridHelper(200, 100, 0xff0055, 0x220022);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // Procedural City Buildings
        const buildingGeo = new THREE.BoxGeometry(1, 1, 1);
        // Translate pivot to bottom so it scales up from the floor
        buildingGeo.translate(0, 0.5, 0); 
        
        const buildingMat = new THREE.MeshBasicMaterial({ 
            color: 0x000000, 
            wireframe: true,
            transparent: true,
            opacity: 0.5
        });
        
        // Add solid dark material inside wireframe
        const solidMat = new THREE.MeshBasicMaterial({ color: 0x050505 });
        const cityGroup = new THREE.Group();

        const buildingCount = 400;
        for (let i = 0; i < buildingCount; i++) {
            const mesh = new THREE.Mesh(buildingGeo, buildingMat);
            const solid = new THREE.Mesh(buildingGeo, solidMat);
            
            // Random positions excluding the center highway
            let px = (Math.random() - 0.5) * 100;
            if (Math.abs(px) < 5) px += (px > 0 ? 5 : -5); // Keep highway clear
            
            const pz = (Math.random() - 0.5) * 100;
            
            mesh.position.set(px, 0, pz);
            solid.position.set(px, 0, pz);
            
            // Random heights
            const height = 1 + Math.random() * Math.random() * 15;
            mesh.scale.set(2, height, 2);
            solid.scale.set(1.9, height, 1.9); // Slightly smaller to avoid Z-fighting
            
            // Neon accent colors based on height
            if (height > 10) {
                mesh.material = new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true });
            } else if (height > 5) {
                mesh.material = new THREE.MeshBasicMaterial({ color: 0xbcff00, wireframe: true });
            }

            cityGroup.add(mesh);
            cityGroup.add(solid);
        }
        scene.add(cityGroup);

        // Flying lights (traffic)
        const trafficGeo = new THREE.SphereGeometry(0.1, 8, 8);
        const trafficMat1 = new THREE.MeshBasicMaterial({ color: 0xff0000 }); // Tail lights
        const trafficMat2 = new THREE.MeshBasicMaterial({ color: 0xffffff }); // Head lights
        
        const traffics = [];
        for (let i = 0; i < 50; i++) {
            const isHead = Math.random() > 0.5;
            const t = new THREE.Mesh(trafficGeo, isHead ? trafficMat2 : trafficMat1);
            t.position.set(
                isHead ? Math.random() * 4 + 1 : -(Math.random() * 4 + 1), 
                0.2, 
                (Math.random() - 0.5) * 100
            );
            t.userData = { speed: isHead ? 0.5 : -0.5 };
            traffics.push(t);
            scene.add(t);
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Move grid to simulate forward movement
            gridHelper.position.z = (time * 10) % 2;

            // Move buildings (treadmill effect)
            cityGroup.position.z = (time * 10) % 100;
            // To make it endless, we actually just move the camera or the whole group
            // Here we move the camera slightly to simulate hover
            camera.position.x = Math.sin(time * 0.5) * 2;
            camera.position.y = 5 + Math.sin(time * 2.0) * 0.2;
            camera.lookAt(camera.position.x, camera.position.y - 2, -100);

            // Move traffic
            traffics.forEach(t => {
                t.position.z += t.userData.speed;
                if (t.position.z > 50) t.position.z = -50;
                if (t.position.z < -50) t.position.z = 50;
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
