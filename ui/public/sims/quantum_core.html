<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ASSIMILATED: QUANTUM_CORE</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Inter', sans-serif; }
        #info {
            position: absolute; top: 30px; left: 40px; color: #bcff00;
            text-transform: uppercase; letter-spacing: 5px; font-size: 0.7rem; font-weight: 800;
            opacity: 0.8; pointer-events: none; z-index: 10;
        }
        #stats {
            position: absolute; bottom: 30px; left: 40px; color: rgba(255, 255, 255, 0.5);
            font-size: 0.65rem; font-family: 'Consolas', monospace; z-index: 10;
        }
        .highlight { color: #bcff00; }
    </style>
</head>
<body>
    <div id="info">HARDWARE: NEURAL_COPROCESSOR_EMULATOR</div>
    <div id="stats">
        NEURAL_NODES: <span class="highlight">4096</span><br>
        SYNC_STABILITY: <span class="highlight" id="coh">99.9%</span><br>
        KERNEL: <span class="highlight">QUMI-CORE-V1 / LOCAL_BRAIN</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 10;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        // Add additive blending post-processing feel
        renderer.toneMapping = THREE.AdditiveBlending;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;

        // --- Quantum Qubit Shell ---
        const geometry = new THREE.IcosahedronGeometry(4, 15);
        const material = new THREE.PointsMaterial({
            color: 0xbcff00,
            size: 0.1,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // Core glow
        const coreGeo = new THREE.IcosahedronGeometry(2, 2);
        const coreMat = new THREE.MeshBasicMaterial({
            color: 0xff0055,
            wireframe: true,
            transparent: true,
            opacity: 0.2
        });
        const core = new THREE.Mesh(coreGeo, coreMat);
        scene.add(core);

        // Lines connecting qubits
        const lineMat = new THREE.LineBasicMaterial({
            color: 0x00f2ff,
            transparent: true,
            opacity: 0.1
        });
        const wireframe = new THREE.LineSegments(new THREE.WireframeGeometry(geometry), lineMat);
        scene.add(wireframe);

        // Animation logic
        const clock = new THREE.Clock();
        const originalPositions = geometry.attributes.position.array.slice();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Morphing quantum states
            const positions = geometry.attributes.position.array;
            for (let i = 0; i < positions.length; i += 3) {
                const ox = originalPositions[i];
                const oy = originalPositions[i + 1];
                const oz = originalPositions[i + 2];

                // Complex math to simulate superposition waves
                const wave = Math.sin(time * 2.0 + ox * 2.0) * Math.cos(time * 1.5 + oy * 2.0) * 0.5;
                
                positions[i] = ox + ox * wave;
                positions[i + 1] = oy + oy * wave;
                positions[i + 2] = oz + oz * wave;
            }
            geometry.attributes.position.needsUpdate = true;
            
            // Core pulsing
            const scale = 1.0 + Math.sin(time * 5.0) * 0.2;
            core.scale.set(scale, scale, scale);
            core.rotation.x -= 0.01;
            core.rotation.y += 0.02;

            // Random coherence fluctuation
            if (Math.random() > 0.9) {
                document.getElementById('coh').innerText = (99.0 + Math.random()).toFixed(2) + '%';
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
